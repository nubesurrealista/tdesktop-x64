---
name: AppImage Packager AnyLinux
on:
  workflow_dispatch: null
  workflow_run:
    workflows:
      - Linux Build
    types:
      - completed
jobs:
  appimage:
    name: Package 64Gram AnyLinux (Arch)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: '--privileged'
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Install Base System Dependencies
        run: |
          sed -i '/NoExtract  = usr\/share\/locale\/\*/d' /etc/pacman.conf
          sed -i '/NoExtract   = !*locale*\/en*/d' /etc/pacman.conf

          pacman -Syu --noconfirm wget curl ca-certificates binutils desktop-file-utils grep sed coreutils zsync xorg-server-xvfb gcc glibc hunspell hunspell-es_es enchant nspr nss aspell hspell fontconfig libx11 libxkbcommon webkit2gtk-4.1 geoclue gst-plugins-good gst-plugin-va

          echo "es_ES.UTF-8 UTF-8" >> /etc/locale.gen
          locale-gen
          export LANG=es_ES.UTF-8
          export LC_ALL=es_ES.UTF-8
      - name: Download Latest Binary Artifact
        uses: dawidd6/action-download-artifact@v20
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: linux.yml
          name: Telegram-Desktop
          repo: nubesurrealista/tdesktop-x64
          workflow_conclusion: success
      - name: Prepare Workspace and Tools
        run: |
          chmod +x Telegram
          mv Telegram /usr/bin/Telegram

          wget --retry-connrefused --tries=30 "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh" -O ./quick-sharun
          chmod +x ./quick-sharun

          wget --retry-connrefused --tries=30 "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/get-debloated-pkgs.sh" -O ./get-debloated-pkgs
          chmod +x ./get-debloated-pkgs

          ./get-debloated-pkgs --add-mesa --add-common --prefer-nano ffmpeg-mini

          find /usr/lib/enchant-2/ -type f ! -name "*hunspell*" -delete
      - name: Create Desktop Entry
        run: |
          mkdir -p build_dir
          cat << 'EOF' > build_dir/64Gram.desktop
          [Desktop Entry]
          Name=64Gram
          Comment=Fork de TG Desktop AnyLinux
          Exec=Telegram -- %u
          Icon=icon
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          StartupWMClass=Telegram
          MimeType=x-scheme-handler/tg;
          EOF
          sed -i 's/^[[:space:]]*//' build_dir/64Gram.desktop
          curl -L https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg -o build_dir/icon.svg
      - name: Build AppImage
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANYLINUX_LIB: 1
          DEPLOY_LOCALE: 1
          STRACE_MODE: 1
          DEPLOY_OPENGL: 1
          DEPLOY_VULKAN: 1
          DEPLOY_PIPEWIRE: 1
          LANG: es_ES.UTF-8
          LC_ALL: es_ES.UTF-8
        run: |
          export ARCH=$(uname -m)
          export VERSION=$(date +%Y%m%d)
          export OUTPATH="./dist"
          export UPINFO="gh-releases-zsync|nubesurrealista|tdesktop-x64|latest|*x86_64.AppImage.zsync"
          export ADD_HOOKS="vulkan-check.src.hook:self-updater.bg.hook"
          export ICON="build_dir/icon.svg"
          export DESKTOP="build_dir/64Gram.desktop"
          export STRIP=1

          xvfb-run ./quick-sharun /usr/bin/Telegram \
            /usr/lib/libwayland-*.so* \
            /usr/lib/libgeoclue*.so* \
            /usr/lib/libwebkit2gtk-4.1.so* \
            /usr/lib/libnss3.so \
            /usr/lib/libnssutil3.so \
            /usr/lib/libsmime3.so \
            /usr/lib/libssl3.so \
            /usr/lib/libsoftokn3.so \
            /usr/lib/libfreeblpriv3.so \
            /usr/lib/libenchant-2.so* \
            /usr/lib/libhunspell-1.7.so* \
            /usr/lib/enchant-2/* \
            /usr/lib/gconv/*

          echo 'DESKTOPINTEGRATION=0' >> ./AppDir/.env

          ./quick-sharun --make-appimage
      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v7
        with:
          name: 64Gram-AnyLinux-AppImage
          path: ./dist/*
