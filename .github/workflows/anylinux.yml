name: AppImage Packager AnyLinux

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Linux Build"]
    types:
      - completed

jobs:
  appimage:
    name: Package 64Gram AnyLinux
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Tooling
        run: |
          sudo curl -fsSL "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/quick-sharun.sh" -o /usr/local/bin/quick-sharun
          sudo chmod +x /usr/local/bin/quick-sharun
          
          sudo curl -fsSL "https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/refs/heads/main/useful-tools/get-debloated-pkgs.sh" -o /usr/local/bin/get-debloated-pkgs
          sudo chmod +x /usr/local/bin/get-debloated-pkgs
          
          sudo curl -fsSL "https://github.com/pkgforge-dev/sharun/releases/latest/download/sharun-$(uname -m)" -o /usr/local/bin/sharun
          sudo chmod +x /usr/local/bin/sharun

      - name: Download Latest Binary Artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: linux.yml
          name: Telegram-Desktop
          repo: nubesurrealista/tdesktop-x64
          workflow_conclusion: success

      - name: Prepare Workspace and Debloated Libs
        run: |
          mkdir -p build_dir
          mv Telegram build_dir/Telegram
          chmod +x build_dir/Telegram
          
          get-debloated-pkgs --add-mesa --add-common --prefer-nano
          
          curl -L https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg -o build_dir/icon.svg
          
          printf "[Desktop Entry]\nName=64Gram\nComment=Fork de TG Desktop AnyLinux\nExec=Telegram -- %%u\nIcon=icon\nTerminal=false\nType=Application\nCategories=Network;InstantMessaging;\nStartupWMClass=Telegram\nMimeType=x-scheme-handler/tg;\n" > build_dir/64Gram.desktop

      - name: Build AppImage
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          export ARCH=$(uname -m)
          export VERSION=$(date +%Y%m%d)
          export OUTPATH="./dist"
          
          export ADD_HOOKS="vulkan-check.src.hook"
          
          export ICON="build_dir/icon.svg"
          export DESKTOP="build_dir/64Gram.desktop"
          export STRIP=1
          
          quick-sharun ./build_dir/Telegram
          quick-sharun --make-appimage

      - name: Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 64Gram-AnyLinux-AppImage
          path: ./dist/*
